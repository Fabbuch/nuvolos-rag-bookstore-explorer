<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookBot</title>
    <style>
        :root {
            --paper: #f5efe3;
            --paper-light: #fbf7ef;
            --paper-deep: #eadbc2;
            --ink: #2e2419;
            --ink-muted: #756552;
            --walnut: #2b2117;
            --walnut-soft: #3a2a1c;
            --walnut-panel: rgba(69, 50, 31, 0.76);
            --line: #dcc9ac;
            --line-strong: #c7aa7b;
            --gold: #bf8e46;
            --gold-light: #e5bf73;
            --sage: #61715a;
            --cream-shadow: rgba(59, 42, 25, 0.12);
            --sidebar-width: 328px;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                linear-gradient(90deg, rgba(48, 35, 22, 0.08) 1px, transparent 1px),
                linear-gradient(0deg, rgba(48, 35, 22, 0.06) 1px, transparent 1px),
                var(--paper);
            background-size: 42px 42px, 42px 42px, auto;
        }

        button,
        textarea,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .app-shell {
            height: 100vh;
            display: grid;
            grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
            overflow: hidden;
        }

        .sidebar {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px 20px 28px;
            overflow: hidden;
            color: #f7eddc;
            background:
                linear-gradient(180deg, rgba(33, 24, 16, 0.88), rgba(33, 24, 16, 0.98)),
                repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 7px),
                var(--walnut);
            box-shadow: 12px 0 28px rgba(39, 29, 19, 0.18);
            z-index: 5;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 30px;
            padding: 0 8px;
        }

        .brand-mark {
            width: 74px;
            height: 64px;
            flex: 0 0 auto;
            color: var(--gold-light);
        }

        .brand-name {
            display: block;
            color: #fff5e6;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 31px;
            line-height: 1;
            letter-spacing: 0;
        }

        .brand-subtitle {
            display: block;
            margin-top: 8px;
            color: #d7b980;
            font-size: 14px;
            line-height: 1.25;
        }

        .new-chat-button {
            width: 100%;
            min-height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
            border: 1px solid rgba(234, 194, 122, 0.62);
            border-radius: var(--radius);
            color: #fff8eb;
            background: linear-gradient(180deg, #d9a85a, #b77d2e);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 10px 18px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: transform 160ms ease, filter 160ms ease;
        }

        .new-chat-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        .new-chat-button svg {
            width: 20px;
            height: 20px;
        }

        .history-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 34px 8px 14px;
            color: #d8b572;
            font-size: 12px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .history-header::after {
            content: "";
            height: 1px;
            flex: 1;
            background: rgba(216, 181, 114, 0.28);
        }

        .chat-history {
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            padding: 0 0 14px;
            scrollbar-color: rgba(228, 185, 111, 0.55) rgba(255, 255, 255, 0.04);
            scrollbar-width: thin;
        }

        .chat-row {
            width: 100%;
            min-height: 62px;
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr) 32px 32px;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            padding: 11px 12px;
            border-radius: var(--radius);
            color: #f5ead8;
            background: transparent;
            cursor: pointer;
        }

        .chat-row:hover,
        .chat-row.is-active {
            background: var(--walnut-panel);
        }

        .chat-row.is-active {
            box-shadow: inset 3px 0 0 var(--gold-light);
        }

        .chat-icon {
            color: #f4e6cb;
        }

        .chat-title {
            min-width: 0;
            max-height: 42px;
            overflow: hidden;
            color: inherit;
            text-align: left;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }

        .icon-button {
            width: 32px;
            height: 32px;
            display: inline-grid;
            place-items: center;
            border-radius: 7px;
            color: #d9b46f;
            background: transparent;
            cursor: pointer;
        }

        .icon-button:hover {
            color: #fff2d5;
            background: rgba(255, 255, 255, 0.1);
        }

        .icon-button svg {
            width: 18px;
            height: 18px;
        }

        .sidebar-quote {
            margin-top: 20px;
            padding: 22px 14px 0;
            border-top: 1px solid rgba(216, 181, 114, 0.26);
            text-align: center;
            color: #d8b572;
        }

        .quote-book {
            width: 42px;
            height: 28px;
            margin: 0 auto 16px;
            color: var(--gold-light);
        }

        .quote {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-style: italic;
            line-height: 1.35;
        }

        .quote-author {
            margin-top: 16px;
            color: #d7c3a0;
            font-size: 14px;
        }

        .main {
            min-width: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            padding: 30px 38px 20px;
            background:
                radial-gradient(circle at 50% -10%, rgba(255, 252, 244, 0.9), rgba(255, 252, 244, 0) 36%),
                linear-gradient(180deg, rgba(255, 251, 243, 0.84), rgba(242, 232, 214, 0.78)),
                var(--paper);
        }

        .chat-layout {
            width: min(100%, 1060px);
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            text-align: center;
            padding-top: 4px;
        }

        .ornament {
            width: min(250px, 42vw);
            height: 48px;
            margin: 0 auto 4px;
            color: var(--gold);
        }

        h1 {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: clamp(32px, 4vw, 44px);
            line-height: 1.12;
            font-weight: 600;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 14px 0 0;
            color: var(--ink-muted);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 17px;
        }

        .chat-thread {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 30px 12px 18px;
            scrollbar-color: rgba(191, 142, 70, 0.55) transparent;
            scrollbar-width: thin;
        }

        .message {
            display: flex;
            gap: 18px;
            margin-bottom: 18px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .assistant-avatar {
            width: 48px;
            height: 48px;
            flex: 0 0 auto;
            display: grid;
            place-items: center;
            border: 1px solid var(--line-strong);
            border-radius: 50%;
            color: var(--gold);
            background: rgba(255, 252, 245, 0.62);
            box-shadow: 0 8px 18px rgba(74, 52, 30, 0.08);
        }

        .assistant-avatar svg {
            width: 28px;
            height: 28px;
        }

        .message-stack {
            width: min(780px, 82%);
        }

        .assistant-text {
            margin: 4px 0 16px;
            color: #43382c;
            font-size: 17px;
            line-height: 1.55;
        }

        .user-bubble {
            max-width: min(650px, 72%);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 22px;
            border-radius: 8px;
            color: #4c3a2a;
            background: #e6d8c3;
            box-shadow: 0 8px 18px rgba(89, 62, 34, 0.08);
            line-height: 1.4;
        }

        .message-time {
            flex: 0 0 auto;
            color: #887763;
            font-size: 12px;
            white-space: nowrap;
        }

        .book-card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 252, 246, 0.62);
            box-shadow: 0 12px 28px rgba(61, 44, 27, 0.08);
        }

        .book-result {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 18px;
            padding: 22px 24px;
            border-bottom: 1px solid var(--line);
        }

        .book-result:last-child {
            border-bottom: 0;
        }

        .book-title {
            margin: 0;
            color: #372a1d;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 21px;
            line-height: 1.2;
        }

        .book-author {
            margin: 8px 0 12px;
            color: #ad6f22;
            font-size: 15px;
        }

        .book-description {
            margin: 0;
            color: #5f5247;
            line-height: 1.45;
        }

        .book-tag {
            align-self: start;
            min-width: 94px;
            max-width: 180px;
            padding: 7px 12px;
            border: 1px solid var(--gold);
            border-radius: 5px;
            color: #9c681f;
            background: rgba(255, 247, 232, 0.68);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
            text-transform: uppercase;
            overflow-wrap: anywhere;
        }

        .follow-up {
            margin: 12px 4px 0;
            color: #5f5142;
            line-height: 1.5;
        }

        .empty-state {
            width: min(760px, 100%);
            margin: 40px auto 0;
            padding: 34px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            color: var(--ink-muted);
            background: rgba(255, 252, 246, 0.58);
            text-align: center;
        }

        .empty-state h2 {
            margin: 0 0 12px;
            color: var(--ink);
            font-family: Georgia, "Times New Roman", serif;
            font-size: 26px;
            letter-spacing: 0;
        }

        .chat-controls {
            flex: 0 0 auto;
        }

        .inspiration-bar {
            display: grid;
            grid-template-columns: auto 42px minmax(0, 1fr) 42px;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 252, 246, 0.78);
            box-shadow: 0 10px 24px rgba(68, 47, 27, 0.07);
        }

        .inspiration-title {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 196px;
            color: #4e4032;
        }

        .bulb-icon {
            width: 28px;
            height: 28px;
            color: var(--gold);
        }

        .inspiration-title strong {
            display: block;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 18px;
            font-weight: 600;
        }

        .rotation-note {
            display: block;
            margin-top: 3px;
            color: #9a8061;
            font-size: 12px;
        }

        .prompt-arrow,
        .send-button {
            display: inline-grid;
            place-items: center;
            cursor: pointer;
        }

        .prompt-arrow {
            width: 36px;
            height: 36px;
            border: 1px solid var(--line);
            border-radius: 50%;
            color: #9d6a25;
            background: rgba(255, 248, 235, 0.8);
        }

        .prompt-arrow:hover {
            background: #fff8eb;
        }

        .prompt-arrow svg {
            width: 18px;
            height: 18px;
        }

        .prompt-list {
            min-width: 0;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .prompt-chip {
            min-height: 58px;
            padding: 10px 12px;
            border: 1px solid #e1cdb0;
            border-radius: 7px;
            color: #5e4b39;
            background: rgba(255, 250, 242, 0.72);
            cursor: pointer;
            line-height: 1.25;
            text-align: center;
        }

        .prompt-chip:hover {
            border-color: var(--gold);
            color: var(--ink);
            background: #fffaf1;
        }

        .composer {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 54px;
            gap: 14px;
            align-items: center;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: rgba(255, 252, 247, 0.9);
            box-shadow: 0 14px 28px rgba(61, 44, 27, 0.1);
        }

        .composer textarea {
            width: 100%;
            min-height: 44px;
            max-height: 120px;
            resize: none;
            border: 0;
            outline: 0;
            color: #493a2b;
            background: transparent;
            line-height: 1.45;
        }

        .composer textarea::placeholder {
            color: #8f806f;
            font-style: italic;
        }

        .send-button {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            color: #fff7e7;
            background: linear-gradient(180deg, #c58d3a, #a86d20);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 8px 16px rgba(91, 60, 25, 0.2);
        }

        .send-button:hover {
            filter: brightness(1.06);
        }

        .send-button svg {
            width: 27px;
            height: 27px;
        }

        .send-button:disabled {
            opacity: 0.48;
            cursor: not-allowed;
        }

        .footer-rule {
            width: min(340px, 70%);
            height: 1px;
            margin: 16px auto 0;
            background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
        }

        [hidden] {
            display: none !important;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: grid;
            place-items: center;
            padding: 24px;
            background: rgba(38, 30, 22, 0.46);
            backdrop-filter: blur(3px);
        }

        .modal-card {
            width: min(430px, 100%);
            padding: 28px;
            border: 1px solid rgba(199, 170, 123, 0.72);
            border-radius: 10px;
            color: var(--ink);
            background:
                linear-gradient(180deg, rgba(255, 252, 246, 0.98), rgba(243, 234, 219, 0.98)),
                var(--paper-light);
            box-shadow: 0 28px 70px rgba(38, 28, 17, 0.32);
        }

        .modal-mark {
            width: 54px;
            height: 54px;
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            border: 1px solid var(--line);
            border-radius: 50%;
            color: var(--gold);
            background: rgba(255, 248, 235, 0.85);
        }

        .modal-mark svg {
            width: 30px;
            height: 30px;
        }

        .modal-title {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            font-size: 26px;
            line-height: 1.15;
            text-align: center;
            letter-spacing: 0;
        }

        .modal-description {
            margin: 10px 0 20px;
            color: var(--ink-muted);
            line-height: 1.45;
            text-align: center;
        }

        .modal-label {
            display: block;
            margin-bottom: 8px;
            color: #5c4a37;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .modal-input {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid var(--line-strong);
            border-radius: 7px;
            color: var(--ink);
            background: rgba(255, 252, 247, 0.9);
            outline: 0;
        }

        .modal-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(191, 142, 70, 0.18);
        }

        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 22px;
        }

        .modal-button {
            min-height: 42px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: 700;
        }

        .modal-button.secondary {
            color: #5f5142;
            border: 1px solid var(--line);
            background: rgba(255, 250, 241, 0.78);
        }

        .modal-button.primary {
            color: #fff8eb;
            background: linear-gradient(180deg, #c58d3a, #a86d20);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }

        .modal-button.danger {
            color: #fff8eb;
            background: linear-gradient(180deg, #a95638, #7f341f);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
        }

        .modal-button:hover {
            filter: brightness(1.04);
        }

        @media (max-width: 1100px) {
            :root {
                --sidebar-width: 290px;
            }

            .main {
                padding-inline: 22px;
            }

            .prompt-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 820px) {
            html,
            body {
                height: auto;
                overflow: auto;
            }

            .app-shell {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 100vh;
                overflow: visible;
            }

            .sidebar {
                height: auto;
                min-height: auto;
                max-height: 420px;
            }

            .main {
                height: auto;
                min-height: 760px;
            }

            .chat-thread {
                min-height: 420px;
            }

            .inspiration-bar {
                grid-template-columns: 1fr 38px 38px;
            }

            .inspiration-title {
                min-width: 0;
            }

            .prompt-list {
                grid-column: 1 / -1;
                grid-row: 2;
            }

            .message-stack,
            .user-bubble {
                max-width: none;
                width: 100%;
            }
        }

        @media (max-width: 560px) {
            .main {
                padding: 22px 14px 16px;
            }

            .book-result {
                grid-template-columns: 1fr;
            }

            .book-tag {
                justify-self: start;
            }

            .prompt-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" aria-label="Shared chat history">
            <div class="brand">
                <svg class="brand-mark" viewBox="0 0 96 74" aria-hidden="true">
                    <path d="M10 18c13-7 26-7 38 2v39c-12-9-25-10-38-3V18Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M48 20c12-9 25-9 38-2v38c-13-7-26-6-38 3V20Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M48 20v42M5 25v38c13-6 28-5 43 4 15-9 30-10 43-4V25" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M50 5l2 5 5 2-5 2-2 5-2-5-5-2 5-2 2-5ZM72 0l1.4 3.5L77 5l-3.6 1.5L72 10l-1.4-3.5L67 5l3.6-1.5L72 0Z" fill="currentColor"/>
                </svg>
                <div>
                    <span class="brand-name">BookBot</span>
                    <span class="brand-subtitle">Your personal<br>reading guide</span>
                </div>
            </div>

            <button class="new-chat-button" id="newChatButton" type="button">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Start new chat</span>
            </button>

            <div class="history-header">Past chats</div>
            <div class="chat-history" id="chatHistory"></div>

            <div class="sidebar-quote">
                <svg class="quote-book" viewBox="0 0 64 40" aria-hidden="true">
                    <path d="M4 12c9-5 18-5 28 2v21c-10-7-19-8-28-3V12Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M32 14c10-7 19-7 28-2v20c-9-5-18-4-28 3V14Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M32 14v23M12 7h12M40 7h12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <p class="quote">"A book is a dream that you hold in your hands."</p>
                <div class="quote-author">- Neil Gaiman</div>
            </div>
        </aside>

        <main class="main">
            <section class="chat-layout" aria-label="Book recommendation chat">
                <header class="page-header">
                    <svg class="ornament" viewBox="0 0 280 54" aria-hidden="true">
                        <path d="M14 36h92M174 36h92" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M140 8c-10 16-18 22-46 28 24-1 37 1 46 9 9-8 22-10 46-9-28-6-36-12-46-28Z" fill="none" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M140 8v35M126 14c3 10 4 19 2 27M154 14c-3 10-4 19-2 27" fill="none" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                    <h1>Describe the kind of book you want</h1>
                    <p class="subtitle">I'll recommend the best reads for you.</p>
                </header>

                <div class="chat-thread" id="chatThread" aria-live="polite"></div>

                <div class="chat-controls">
                    <section class="inspiration-bar" aria-label="Prompt ideas">
                        <div class="inspiration-title">
                            <svg class="bulb-icon" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M9 21h6M10 17h4M8 14c-1.8-1.3-3-3.4-3-5.8C5 4.8 8.1 2 12 2s7 2.8 7 6.2c0 2.4-1.2 4.5-3 5.8-.7.5-1 1.2-1 2H9c0-.8-.3-1.5-1-2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <span>
                                <strong>Need inspiration?</strong>
                                <span class="rotation-note">New ideas every 10 seconds</span>
                            </span>
                        </div>
                        <button class="prompt-arrow" id="prevPromptsButton" type="button" aria-label="Previous prompt ideas" title="Previous">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <div class="prompt-list" id="promptList"></div>
                        <button class="prompt-arrow" id="nextPromptsButton" type="button" aria-label="Next prompt ideas" title="Next">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </section>

                    <form class="composer" id="messageForm">
                        <textarea id="messageInput" rows="1" placeholder="Type your message here..." aria-label="Message"></textarea>
                        <button class="send-button" id="sendButton" type="submit" aria-label="Send message" title="Send">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M4 4l16 8-16 8 4-8-4-8Z" fill="currentColor"/>
                                <path d="M8 12h9" fill="none" stroke="#fff7e7" stroke-width="1.6" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </form>
                    <div class="footer-rule" aria-hidden="true"></div>
                </div>
            </section>
        </main>
    </div>

    <div class="modal-backdrop" id="modalRoot" hidden>
        <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalDescription">
            <div class="modal-mark" id="modalMark" aria-hidden="true"></div>
            <h2 class="modal-title" id="modalTitle"></h2>
            <p class="modal-description" id="modalDescription"></p>
            <form id="modalForm">
                <label class="modal-label" id="modalInputLabel" for="modalInput">Chat name</label>
                <input class="modal-input" id="modalInput" type="text" maxlength="80" autocomplete="off">
                <div class="modal-actions">
                    <button class="modal-button secondary" id="modalCancelButton" type="button">Cancel</button>
                    <button class="modal-button primary" id="modalConfirmButton" type="submit">Save</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        const PROMPTS_PER_PAGE = 4;

        const API_ENDPOINTS = {
            listChats: "/api/chats",
            createChat: "/api/chats",
            getChat: (chatId) => `/api/chats/${chatId}`,
            renameChat: (chatId) => `/api/chats/${chatId}`,
            deleteChat: (chatId) => `/api/chats/${chatId}`,
            sendMessage: (chatId) => `/api/chats/${chatId}/messages`
        };

        async function apiRequest(url, options = {}) {
            const response = await fetch(url, {
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {})
                },
                ...options
            });

            const data = await response.json().catch(() => null);
            if (!response.ok) {
                throw new Error(data?.detail || data?.error || `Request failed: ${response.status}`);
            }
            return data;
        }

        const BookBotApi = {
            async listChats() {
                return apiRequest(API_ENDPOINTS.listChats);
            },

            async getChat(chatId) {
                return apiRequest(API_ENDPOINTS.getChat(chatId));
            },

            async createChat() {
                return apiRequest(API_ENDPOINTS.createChat, {
                    method: "POST",
                    body: JSON.stringify({})
                });
            },

            async renameChat(chatId, title) {
                return apiRequest(API_ENDPOINTS.renameChat(chatId), {
                    method: "PATCH",
                    body: JSON.stringify({ title })
                });
            },

            async deleteChat(chatId) {
                return apiRequest(API_ENDPOINTS.deleteChat(chatId), {
                    method: "DELETE"
                });
            },

            async sendMessage(chatId, text) {
                const trimmed = text.trim();
                if (!trimmed) {
                    return null;
                }
                return apiRequest(API_ENDPOINTS.sendMessage(chatId), {
                    method: "POST",
                    body: JSON.stringify({ content: trimmed })
                });
            }
        };

        const promptIdeas = [
            "I like sci-fi, dragons, and slow-burn love stories",
            "Origins of the universe, but scientific and accessible",
            "Fantasy with strong female leads and political intrigue",
            "Books like Project Hail Mary with clever problem solving",
            "Short books with big emotional impact",
            "Mind-bending books about time, memory, or identity",
            "Cozy mysteries set in small towns or bookstores",
            "Non-fiction about human behavior that reads like a story",
            "Space exploration books that are hopeful, not too dark",
            "Historical fiction with romance and moral dilemmas",
            "Books that explain black holes simply",
            "A funny adventure book for a reading slump",
            "Great science books for curious beginners",
            "Epic fantasy series with found family",
            "Literary fiction about grief, healing, and friendship",
            "Best non-fiction books about the Big Bang"
        ];

        const state = {
            chats: [],
            activeChatId: null,
            promptPage: 0,
            promptTimer: null
        };

        const modalState = {
            mode: null,
            chatId: null,
            previousFocus: null
        };

        const chatHistory = document.getElementById("chatHistory");
        const chatThread = document.getElementById("chatThread");
        const messageForm = document.getElementById("messageForm");
        const messageInput = document.getElementById("messageInput");
        const sendButton = document.getElementById("sendButton");
        const promptList = document.getElementById("promptList");
        const newChatButton = document.getElementById("newChatButton");
        const prevPromptsButton = document.getElementById("prevPromptsButton");
        const nextPromptsButton = document.getElementById("nextPromptsButton");
        const modalRoot = document.getElementById("modalRoot");
        const modalMark = document.getElementById("modalMark");
        const modalTitle = document.getElementById("modalTitle");
        const modalDescription = document.getElementById("modalDescription");
        const modalForm = document.getElementById("modalForm");
        const modalInputLabel = document.getElementById("modalInputLabel");
        const modalInput = document.getElementById("modalInput");
        const modalCancelButton = document.getElementById("modalCancelButton");
        const modalConfirmButton = document.getElementById("modalConfirmButton");

        init();

        async function init() {
            try {
                state.chats = await BookBotApi.listChats();
                state.activeChatId = state.chats[0]?.id || null;
            } catch (error) {
                console.error("Failed to load chat history:", error);
                state.chats = [];
                state.activeChatId = null;
            }
            render();
            startPromptRotation();
            messageInput.focus();
        }

        function render() {
            renderHistory();
            renderThread();
            renderPrompts();
        }

        function renderHistory() {
            chatHistory.replaceChildren();

            state.chats.forEach((chat) => {
                const row = document.createElement("div");
                row.className = `chat-row${chat.id === state.activeChatId ? " is-active" : ""}`;
                row.tabIndex = 0;
                row.setAttribute("role", "button");
                row.setAttribute("aria-label", `Open chat: ${chat.title}`);
                row.addEventListener("click", () => openChat(chat.id));
                row.addEventListener("keydown", (event) => {
                    if (event.key === "Enter" || event.key === " ") {
                        event.preventDefault();
                        openChat(chat.id);
                    }
                });

                const icon = iconSvg("chat");
                icon.classList.add("chat-icon");

                const title = document.createElement("span");
                title.className = "chat-title";
                title.textContent = chat.title;

                const renameButton = document.createElement("button");
                renameButton.type = "button";
                renameButton.className = "icon-button";
                renameButton.title = "Rename";
                renameButton.setAttribute("aria-label", `Rename ${chat.title}`);
                renameButton.append(iconSvg("edit"));
                renameButton.addEventListener("click", (event) => {
                    event.stopPropagation();
                    renameChat(chat.id);
                });

                const deleteButton = document.createElement("button");
                deleteButton.type = "button";
                deleteButton.className = "icon-button";
                deleteButton.title = "Delete";
                deleteButton.setAttribute("aria-label", `Delete ${chat.title}`);
                deleteButton.append(iconSvg("trash"));
                deleteButton.addEventListener("click", (event) => {
                    event.stopPropagation();
                    deleteChat(chat.id);
                });

                row.append(icon, title, renameButton, deleteButton);
                chatHistory.append(row);
            });
        }

        function renderThread() {
            chatThread.replaceChildren();
            const activeChat = getActiveChat();

            if (!activeChat || activeChat.messages.length === 0) {
                const emptyState = document.createElement("div");
                emptyState.className = "empty-state";
                const title = document.createElement("h2");
                title.textContent = "Start with a mood, genre, theme, or memory of a book you loved.";
                const copy = document.createElement("p");
                copy.textContent = "BookBot will turn a human description into a focused recommendation list.";
                emptyState.append(title, copy);
                chatThread.append(emptyState);
                return;
            }

            activeChat.messages.forEach((message) => {
                chatThread.append(renderMessage(message));
            });

            requestAnimationFrame(() => {
                chatThread.scrollTop = chatThread.scrollHeight;
            });
        }

        function renderMessage(message) {
            const wrapper = document.createElement("article");
            wrapper.className = `message ${message.role}`;

            if (message.role === "user") {
                const bubble = document.createElement("div");
                bubble.className = "user-bubble";
                const content = document.createElement("span");
                content.textContent = message.content;
                const time = document.createElement("span");
                time.className = "message-time";
                time.textContent = formatTime(message.createdAt);
                bubble.append(content, time);
                wrapper.append(bubble);
                return wrapper;
            }

            const avatar = document.createElement("div");
            avatar.className = "assistant-avatar";
            avatar.append(iconSvg("book"));

            const stack = document.createElement("div");
            stack.className = "message-stack";

            const text = document.createElement("p");
            text.className = "assistant-text";
            text.textContent = message.content;
            stack.append(text);

            if (message.recommendations?.length) {
                stack.append(renderRecommendations(message.recommendations));
            }

            if (message.followUp) {
                const followUp = document.createElement("p");
                followUp.className = "follow-up";
                followUp.textContent = message.followUp;
                stack.append(followUp);
            }

            wrapper.append(avatar, stack);
            return wrapper;
        }

        function renderRecommendations(recommendations) {
            const card = document.createElement("div");
            card.className = "book-card";

            recommendations.forEach((book) => {
                const item = document.createElement("article");
                item.className = "book-result";

                const copy = document.createElement("div");
                const title = document.createElement("h3");
                title.className = "book-title";
                title.textContent = book.title;
                const author = document.createElement("p");
                author.className = "book-author";
                author.textContent = book.author;
                const description = document.createElement("p");
                description.className = "book-description";
                description.textContent = book.description;
                copy.append(title, author, description);

                const tag = document.createElement("div");
                tag.className = "book-tag";
                tag.textContent = book.tag;

                item.append(copy, tag);
                card.append(item);
            });

            return card;
        }

        function renderPrompts() {
            promptList.replaceChildren();
            visiblePrompts().forEach((prompt) => {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "prompt-chip";
                button.textContent = prompt;
                button.addEventListener("click", () => {
                    messageInput.value = prompt;
                    resizeInput();
                    messageInput.focus();
                });
                promptList.append(button);
            });
        }

        function visiblePrompts() {
            const start = (state.promptPage * PROMPTS_PER_PAGE) % promptIdeas.length;
            return Array.from({ length: PROMPTS_PER_PAGE }, (_, index) => (
                promptIdeas[(start + index) % promptIdeas.length]
            ));
        }

        async function openChat(chatId) {
            state.activeChatId = chatId;
            render();
            messageInput.focus();
        }

        function renameChat(chatId) {
            const chat = state.chats.find((item) => item.id === chatId);
            if (!chat) {
                return;
            }
            openModal({
                mode: "rename",
                chatId,
                title: "Rename chat",
                description: "Choose a clearer name for this shared search.",
                icon: "edit",
                inputValue: chat.title,
                inputVisible: true,
                confirmLabel: "Rename",
                danger: false
            });
        }

        function deleteChat(chatId) {
            const chat = state.chats.find((item) => item.id === chatId);
            if (!chat) {
                return;
            }
            openModal({
                mode: "delete",
                chatId,
                title: "Delete chat?",
                description: `"${chat.title}" will be removed from the shared history.`,
                icon: "trash",
                inputValue: "",
                inputVisible: false,
                confirmLabel: "Delete",
                danger: true
            });
        }

        function openModal(config) {
            modalState.mode = config.mode;
            modalState.chatId = config.chatId;
            modalState.previousFocus = document.activeElement;

            modalMark.replaceChildren(iconSvg(config.icon));
            modalTitle.textContent = config.title;
            modalDescription.textContent = config.description;
            modalInput.value = config.inputValue || "";
            modalInput.hidden = !config.inputVisible;
            modalInputLabel.hidden = !config.inputVisible;
            modalInput.required = config.inputVisible;
            modalConfirmButton.textContent = config.confirmLabel;
            modalConfirmButton.className = `modal-button ${config.danger ? "danger" : "primary"}`;
            modalRoot.hidden = false;

            window.setTimeout(() => {
                if (config.inputVisible) {
                    modalInput.focus();
                    modalInput.select();
                } else {
                    modalConfirmButton.focus();
                }
            }, 0);
        }

        function closeModal() {
            modalRoot.hidden = true;
            modalState.mode = null;
            modalState.chatId = null;
            modalConfirmButton.disabled = false;

            if (modalState.previousFocus?.focus) {
                modalState.previousFocus.focus();
            }
            modalState.previousFocus = null;
        }

        async function submitModal(event) {
            event.preventDefault();

            if (!modalState.mode || !modalState.chatId) {
                closeModal();
                return;
            }

            modalConfirmButton.disabled = true;
            try {
                if (modalState.mode === "rename") {
                    const title = modalInput.value.trim();
                    if (!title) {
                        modalInput.focus();
                        modalConfirmButton.disabled = false;
                        return;
                    }
                    await BookBotApi.renameChat(modalState.chatId, title);
                }

                if (modalState.mode === "delete") {
                    await BookBotApi.deleteChat(modalState.chatId);
                    if (state.activeChatId === modalState.chatId) {
                        const remainingChats = await BookBotApi.listChats();
                        state.activeChatId = remainingChats[0]?.id || null;
                    }
                }

                state.chats = await BookBotApi.listChats();
                closeModal();
                render();
            } catch (error) {
                console.error("Failed to update chat:", error);
                modalConfirmButton.disabled = false;
            }
        }

        async function startNewChat() {
            const chat = await BookBotApi.createChat();
            state.chats = await BookBotApi.listChats();
            state.activeChatId = chat.id;
            messageInput.value = "";
            resizeInput();
            render();
            messageInput.focus();
        }

        async function submitMessage(event) {
            event.preventDefault();
            const text = messageInput.value.trim();
            if (!text) {
                return;
            }

            sendButton.disabled = true;
            try {
                const targetChatId = state.activeChatId || (await BookBotApi.createChat()).id;
                await BookBotApi.sendMessage(targetChatId, text);
                state.chats = await BookBotApi.listChats();
                state.activeChatId = targetChatId;
                messageInput.value = "";
                resizeInput();
                render();
            } catch (error) {
                console.error("Failed to send message:", error);
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        function startPromptRotation() {
            window.clearInterval(state.promptTimer);
            state.promptTimer = window.setInterval(() => {
                movePrompts(1);
            }, 10000);
        }

        function movePrompts(direction) {
            const pageCount = Math.ceil(promptIdeas.length / PROMPTS_PER_PAGE);
            state.promptPage = (state.promptPage + direction + pageCount) % pageCount;
            renderPrompts();
        }

        function getActiveChat() {
            return state.chats.find((chat) => chat.id === state.activeChatId);
        }

        function formatTime(value) {
            return new Intl.DateTimeFormat([], {
                hour: "numeric",
                minute: "2-digit"
            }).format(new Date(value));
        }

        function resizeInput() {
            messageInput.style.height = "auto";
            messageInput.style.height = `${Math.min(messageInput.scrollHeight, 120)}px`;
        }

        function iconSvg(name) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 24 24");
            svg.setAttribute("aria-hidden", "true");
            svg.setAttribute("fill", "none");
            svg.setAttribute("stroke", "currentColor");
            svg.setAttribute("stroke-width", "1.8");
            svg.setAttribute("stroke-linecap", "round");
            svg.setAttribute("stroke-linejoin", "round");

            const paths = {
                chat: ["M21 11.5a8.4 8.4 0 0 1-9 8.4 8.8 8.8 0 0 1-3.9-.9L3 20l1.2-4.4A8.2 8.2 0 0 1 3 11.5 8.5 8.5 0 0 1 12 3a8.5 8.5 0 0 1 9 8.5Z"],
                edit: ["M12 20h9", "M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4L16.5 3.5Z"],
                trash: ["M3 6h18", "M8 6V4h8v2", "M6 6l1 15h10l1-15", "M10 11v6", "M14 11v6"],
                book: ["M4 6.5c5-2.5 9-1.8 12 1.5v11c-3-3.3-7-4-12-1.5v-11Z", "M16 8c1.3-1.2 2.6-1.8 4-1.8v11c-1.4 0-2.7.6-4 1.8V8Z", "M16 8v11"]
            };

            paths[name].forEach((definition) => {
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", definition);
                svg.append(path);
            });

            return svg;
        }

        newChatButton.addEventListener("click", startNewChat);
        messageForm.addEventListener("submit", submitMessage);
        messageInput.addEventListener("input", resizeInput);
        messageInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                messageForm.requestSubmit();
            }
        });
        prevPromptsButton.addEventListener("click", () => {
            movePrompts(-1);
            startPromptRotation();
        });
        nextPromptsButton.addEventListener("click", () => {
            movePrompts(1);
            startPromptRotation();
        });
        modalForm.addEventListener("submit", submitModal);
        modalCancelButton.addEventListener("click", closeModal);
        modalRoot.addEventListener("click", (event) => {
            if (event.target === modalRoot) {
                closeModal();
            }
        });
        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && !modalRoot.hidden) {
                closeModal();
            }
        });
    </script>
</body>
</html>
