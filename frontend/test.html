<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test Page</h1>
    <button onclick="testDocuments()">Test /documents endpoint</button>
    <pre id="output"></pre>
    
    <script>
        async function testDocuments() {
            const output = document.getElementById('output');
            output.textContent = 'Testing...';
            
            try {
                console.log('Fetching /documents...');
                const response = await fetch('/documents');
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                const text = await response.text();
                console.log('Raw response:', text);
                
                // Try to parse as JSON
                try {
                    const data = JSON.parse(text);
                    output.textContent = 'SUCCESS!\n\n' + JSON.stringify(data, null, 2);
                } catch (e) {
                    output.textContent = 'ERROR PARSING JSON:\n' + e.message + '\n\nRaw response:\n' + text;
                }
            } catch (error) {
                output.textContent = 'FETCH ERROR:\n' + error.message;
                console.error('Error:', error);
            }
        }
        
        // Auto-test on load
        window.addEventListener('load', testDocuments);
    </script>
</body>
</html>
